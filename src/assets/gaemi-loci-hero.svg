<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#eab308"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="16" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.08" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
  </g>

  <!-- Map/Globe representation -->
  <circle cx="300" cy="185" r="110" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="300" cy="185" r="80" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
  <ellipse cx="300" cy="185" rx="110" ry="40" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>
  <ellipse cx="300" cy="185" rx="40" ry="110" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.2"/>

  <!-- Route nodes and edges -->
  <g stroke="url(#green)" stroke-width="2" opacity="0.7">
    <line x1="220" y1="150" x2="270" y2="170"/>
    <line x1="270" y1="170" x2="330" y2="160"/>
    <line x1="330" y1="160" x2="370" y2="200"/>
    <line x1="370" y1="200" x2="340" y2="240"/>
    <line x1="340" y1="240" x2="280" y2="230"/>
    <line x1="280" y1="230" x2="240" y2="210"/>
  </g>

  <!-- Route nodes -->
  <circle cx="220" cy="150" r="5" fill="#22c55e"/>
  <circle cx="270" cy="170" r="5" fill="#22c55e"/>
  <circle cx="330" cy="160" r="5" fill="#22c55e"/>
  <circle cx="370" cy="200" r="5" fill="#22c55e"/>
  <circle cx="340" cy="240" r="5" fill="#22c55e"/>
  <circle cx="280" cy="230" r="5" fill="#22c55e"/>
  <circle cx="240" cy="210" r="5" fill="#22c55e"/>

  <!-- POI markers -->
  <g fill="#f97316">
    <path d="M250 130 l5-12 l5 12 z" opacity="0.8"/>
    <circle cx="255" cy="125" r="3"/>
    <path d="M380 170 l5-12 l5 12 z" opacity="0.8"/>
    <circle cx="385" cy="165" r="3"/>
  </g>

  <!-- Robot icon -->
  <g transform="translate(290, 190)">
    <rect x="-12" y="-12" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.9"/>
    <circle cx="0" cy="-2" r="4" fill="white" opacity="0.9"/>
    <rect x="-6" y="4" width="12" height="3" rx="1.5" fill="white" opacity="0.7"/>
  </g>

  <!-- Service boxes -->
  <!-- Site Manager -->
  <g transform="translate(60, 50)">
    <rect width="120" height="50" rx="8" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#0ea5e9" font-size="11" font-family="system-ui" font-weight="600">Site Manager</text>
    <text x="60" y="38" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">React + Express</text>
  </g>

  <!-- Bridge Server -->
  <g transform="translate(240, 40)">
    <rect width="120" height="50" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
    <text x="60" y="22" text-anchor="middle" fill="#8b5cf6" font-size="11" font-family="system-ui" font-weight="600">Bridge Server</text>
    <text x="60" y="38" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">WebSocket + gRPC</text>
  </g>

  <!-- HD Map Server -->
  <g transform="translate(420, 50)">
    <rect width="130" height="50" rx="8" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
    <text x="65" y="22" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui" font-weight="600">HD Map Server</text>
    <text x="65" y="38" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">C++ / CUDA / gRPC</text>
  </g>

  <!-- Connection arrows -->
  <g stroke="#475569" stroke-width="1" stroke-dasharray="4,3" opacity="0.5">
    <line x1="180" y1="75" x2="240" y2="65"/>
    <line x1="360" y1="65" x2="420" y2="75"/>
  </g>

  <!-- Bottom phase indicators -->
  <g transform="translate(100, 330)">
    <rect width="100" height="36" rx="6" fill="#0ea5e9" opacity="0.15" stroke="#0ea5e9" stroke-width="1"/>
    <text x="50" y="16" text-anchor="middle" fill="#0ea5e9" font-size="10" font-family="system-ui" font-weight="600">Phase 1</text>
    <text x="50" y="29" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">구역 정의</text>
  </g>
  <g transform="translate(250, 330)">
    <rect width="100" height="36" rx="6" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1"/>
    <text x="50" y="16" text-anchor="middle" fill="#8b5cf6" font-size="10" font-family="system-ui" font-weight="600">Phase 2</text>
    <text x="50" y="29" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">맵 생성</text>
  </g>
  <g transform="translate(400, 330)">
    <rect width="100" height="36" rx="6" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1"/>
    <text x="50" y="16" text-anchor="middle" fill="#22c55e" font-size="10" font-family="system-ui" font-weight="600">Phase 3</text>
    <text x="50" y="29" text-anchor="middle" fill="#94a3b8" font-size="8" font-family="system-ui">맵 확장</text>
  </g>

  <!-- Phase arrows -->
  <g stroke="#475569" stroke-width="1.5" opacity="0.4">
    <line x1="205" y1="348" x2="245" y2="348"/>
    <polygon points="245,345 251,348 245,351" fill="#475569"/>
    <line x1="355" y1="348" x2="395" y2="348"/>
    <polygon points="395,345 401,348 395,351" fill="#475569"/>
  </g>
</svg>
