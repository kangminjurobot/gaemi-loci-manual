<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" fill="none">
  <defs>
    <linearGradient id="bg-ed" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="820" height="300" rx="12" fill="url(#bg-ed)"/>

  <text x="410" y="30" text-anchor="middle" fill="#e2e8f0" font-size="14" font-family="system-ui" font-weight="700">GAEMI Loci 제공 도구</text>

  <!-- Row 1: 4 cards -->

  <!-- Dashboard -->
  <g transform="translate(20, 48)">
    <rect width="185" height="105" rx="10" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="1.2"/>
    <g transform="translate(15, 16)">
      <rect x="0" y="0" width="40" height="28" rx="4" fill="#6366f1" opacity="0.15" stroke="#6366f1" stroke-width="0.5"/>
      <rect x="4" y="4" width="14" height="3" rx="1" fill="#818cf8" opacity="0.6"/>
      <rect x="4" y="10" width="14" height="3" rx="1" fill="#818cf8" opacity="0.4"/>
      <rect x="4" y="16" width="14" height="3" rx="1" fill="#818cf8" opacity="0.3"/>
      <rect x="22" y="4" width="14" height="20" rx="2" fill="#818cf8" opacity="0.2"/>
      <rect x="24" y="18" width="4" height="6" fill="#818cf8" opacity="0.5" transform="rotate(180 26 21)"/>
      <rect x="30" y="14" width="4" height="10" fill="#818cf8" opacity="0.5" transform="rotate(180 32 19)"/>
    </g>
    <text x="70" y="28" fill="#818cf8" font-size="11" font-family="system-ui" font-weight="600">대시보드</text>
    <text x="15" y="62" fill="#94a3b8" font-size="8" font-family="system-ui">• 작업(Job) 생성 및 관리</text>
    <text x="15" y="75" fill="#94a3b8" font-size="8" font-family="system-ui">• 단계별 진행 상태 확인</text>
    <text x="15" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• 세계 지도 위 현황 표시</text>
  </g>

  <!-- Service Area Editor -->
  <g transform="translate(215, 48)">
    <rect width="185" height="105" rx="10" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.2"/>
    <g transform="translate(15, 16)">
      <rect x="0" y="0" width="40" height="28" rx="4" fill="#1e3a5f" stroke="#0ea5e9" stroke-width="0.5" opacity="0.5"/>
      <circle cx="20" cy="14" r="8" fill="none" stroke="#0ea5e9" stroke-width="0.8" stroke-dasharray="3,2"/>
      <circle cx="20" cy="14" r="2" fill="#0ea5e9"/>
    </g>
    <text x="70" y="22" fill="#0ea5e9" font-size="11" font-family="system-ui" font-weight="600">서비스 구역</text>
    <text x="70" y="36" fill="#0ea5e9" font-size="11" font-family="system-ui" font-weight="600">에디터</text>
    <text x="15" y="62" fill="#94a3b8" font-size="8" font-family="system-ui">• 위성 지도에서 구역 지정</text>
    <text x="15" y="75" fill="#94a3b8" font-size="8" font-family="system-ui">• 주소 검색 및 위치 선택</text>
    <text x="15" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• 구역 정보 등록</text>
  </g>

  <!-- Path Editor -->
  <g transform="translate(410, 48)">
    <rect width="185" height="105" rx="10" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.2"/>
    <g transform="translate(15, 16)">
      <line x1="5" y1="22" x2="20" y2="8" stroke="#22c55e" stroke-width="1"/>
      <line x1="20" y1="8" x2="35" y2="16" stroke="#22c55e" stroke-width="1"/>
      <line x1="35" y1="16" x2="28" y2="26" stroke="#22c55e" stroke-width="1"/>
      <circle cx="5" cy="22" r="3" fill="#22c55e"/>
      <circle cx="20" cy="8" r="3" fill="#22c55e"/>
      <circle cx="35" cy="16" r="3" fill="#22c55e"/>
      <circle cx="28" cy="26" r="3" fill="#22c55e"/>
    </g>
    <text x="70" y="28" fill="#22c55e" font-size="11" font-family="system-ui" font-weight="600">경로 에디터</text>
    <text x="15" y="62" fill="#94a3b8" font-size="8" font-family="system-ui">• 경유지 및 구간 편집</text>
    <text x="15" y="75" fill="#94a3b8" font-size="8" font-family="system-ui">• 주행 경로 작성</text>
    <text x="15" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• 경로 검토 및 승인</text>
  </g>

  <!-- Base Map Editor -->
  <g transform="translate(615, 48)">
    <rect width="185" height="105" rx="10" fill="#8b5cf6" opacity="0.1" stroke="#8b5cf6" stroke-width="1.2"/>
    <g transform="translate(15, 16)">
      <rect x="0" y="4" width="30" height="22" rx="3" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="0.5"/>
      <circle cx="8" cy="14" r="1.5" fill="#c4b5fd"/>
      <circle cx="14" cy="10" r="1.5" fill="#c4b5fd"/>
      <circle cx="20" cy="18" r="1.5" fill="#c4b5fd"/>
      <circle cx="12" cy="20" r="1.5" fill="#c4b5fd"/>
      <circle cx="24" cy="12" r="1.5" fill="#c4b5fd"/>
    </g>
    <text x="70" y="22" fill="#8b5cf6" font-size="11" font-family="system-ui" font-weight="600">베이스 맵</text>
    <text x="70" y="36" fill="#8b5cf6" font-size="11" font-family="system-ui" font-weight="600">에디터</text>
    <text x="15" y="62" fill="#94a3b8" font-size="8" font-family="system-ui">• 현장 매핑 제어</text>
    <text x="15" y="75" fill="#94a3b8" font-size="8" font-family="system-ui">• 충전 스테이션 등록</text>
    <text x="15" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• 3D 데이터 확인</text>
  </g>

  <!-- Row 2: 3 cards -->

  <!-- 2D Map Editor -->
  <g transform="translate(80, 168)">
    <rect width="200" height="105" rx="10" fill="#f97316" opacity="0.1" stroke="#f97316" stroke-width="1.2"/>
    <g transform="translate(15, 16)">
      <rect x="0" y="2" width="12" height="12" fill="#f97316" opacity="0.3" rx="1"/>
      <rect x="14" y="2" width="12" height="12" fill="#f97316" opacity="0.15" rx="1"/>
      <rect x="28" y="2" width="12" height="12" fill="#f97316" opacity="0.3" rx="1"/>
      <rect x="0" y="16" width="12" height="12" fill="#f97316" opacity="0.15" rx="1"/>
      <rect x="14" y="16" width="12" height="12" fill="#f97316" opacity="0.3" rx="1"/>
      <rect x="28" y="16" width="12" height="12" fill="#f97316" opacity="0.15" rx="1"/>
    </g>
    <text x="75" y="28" fill="#f97316" font-size="11" font-family="system-ui" font-weight="600">2D 맵 에디터</text>
    <text x="15" y="62" fill="#94a3b8" font-size="8" font-family="system-ui">• 장애물 맵 수정</text>
    <text x="15" y="75" fill="#94a3b8" font-size="8" font-family="system-ui">• 브러시 / 다각형 그리기</text>
    <text x="15" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• 레이어 관리</text>
  </g>

  <!-- 3D Map Correction -->
  <g transform="translate(310, 168)">
    <rect width="200" height="105" rx="10" fill="#ec4899" opacity="0.1" stroke="#ec4899" stroke-width="1.2"/>
    <g transform="translate(15, 16)">
      <circle cx="12" cy="14" r="10" fill="none" stroke="#ec4899" stroke-width="0.8" stroke-dasharray="2,2"/>
      <line x1="4" y1="14" x2="20" y2="14" stroke="#ec4899" stroke-width="0.6"/>
      <line x1="12" y1="6" x2="12" y2="22" stroke="#ec4899" stroke-width="0.6"/>
      <circle cx="12" cy="14" r="2" fill="#ec4899"/>
      <circle cx="30" cy="8" r="3" fill="#f9a8d4" opacity="0.5"/>
      <circle cx="36" cy="20" r="3" fill="#f9a8d4" opacity="0.5"/>
      <line x1="30" y1="8" x2="36" y2="20" stroke="#ec4899" stroke-width="0.6" stroke-dasharray="2,1"/>
    </g>
    <text x="75" y="22" fill="#ec4899" font-size="11" font-family="system-ui" font-weight="600">3D 맵 보정</text>
    <text x="15" y="62" fill="#94a3b8" font-size="8" font-family="system-ui">• 기준점 정렬</text>
    <text x="15" y="75" fill="#94a3b8" font-size="8" font-family="system-ui">• 경로 보정</text>
    <text x="15" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• 맵 병합</text>
  </g>

  <!-- File Manager -->
  <g transform="translate(540, 168)">
    <rect width="200" height="105" rx="10" fill="#eab308" opacity="0.1" stroke="#eab308" stroke-width="1.2"/>
    <g transform="translate(15, 16)">
      <rect x="2" y="6" width="28" height="20" rx="3" fill="#eab308" opacity="0.15" stroke="#eab308" stroke-width="0.5"/>
      <polyline points="10,18 16,12 22,18" fill="none" stroke="#eab308" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="16" y1="12" x2="16" y2="22" stroke="#eab308" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <text x="75" y="28" fill="#eab308" font-size="11" font-family="system-ui" font-weight="600">파일 관리</text>
    <text x="15" y="62" fill="#94a3b8" font-size="8" font-family="system-ui">• 매핑 데이터 업로드</text>
    <text x="15" y="75" fill="#94a3b8" font-size="8" font-family="system-ui">• 완성 맵 다운로드</text>
    <text x="15" y="88" fill="#94a3b8" font-size="8" font-family="system-ui">• 진행률 실시간 확인</text>
  </g>
</svg>
