<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <defs>
    <linearGradient id="bg-arch" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="420" rx="12" fill="url(#bg-arch)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#e2e8f0" font-size="16" font-family="system-ui" font-weight="700">System Architecture</text>

  <!-- Site Manager -->
  <g transform="translate(40, 60)">
    <rect width="200" height="140" rx="10" fill="#0ea5e9" opacity="0.12" stroke="#0ea5e9" stroke-width="1.5"/>
    <text x="100" y="24" text-anchor="middle" fill="#0ea5e9" font-size="14" font-family="system-ui" font-weight="700">Site Manager</text>
    <line x1="20" y1="34" x2="180" y2="34" stroke="#0ea5e9" opacity="0.3"/>
    <text x="100" y="55" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Frontend (React 18 + Vite)</text>
    <text x="100" y="72" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Cesium.js · Three.js · OpenLayers</text>
    <line x1="20" y1="84" x2="180" y2="84" stroke="#0ea5e9" opacity="0.15"/>
    <text x="100" y="102" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Backend (Express.js)</text>
    <text x="100" y="118" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">C++ Native Addon (GTSAM)</text>
    <!-- Port -->
    <rect x="140" y="126" width="50" height="14" rx="3" fill="#0ea5e9" opacity="0.25"/>
    <text x="165" y="136" text-anchor="middle" fill="#0ea5e9" font-size="8" font-family="monospace">:80/:5000</text>
  </g>

  <!-- Bridge Server -->
  <g transform="translate(300, 60)">
    <rect width="200" height="140" rx="10" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="100" y="24" text-anchor="middle" fill="#8b5cf6" font-size="14" font-family="system-ui" font-weight="700">Bridge Server</text>
    <line x1="20" y1="34" x2="180" y2="34" stroke="#8b5cf6" opacity="0.3"/>
    <text x="100" y="58" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">WebSocket ↔ gRPC Bridge</text>
    <text x="100" y="78" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Firebase Storage PubSub</text>
    <text x="100" y="98" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Event Monitor</text>
    <!-- Port -->
    <rect x="140" y="126" width="50" height="14" rx="3" fill="#8b5cf6" opacity="0.25"/>
    <text x="165" y="136" text-anchor="middle" fill="#8b5cf6" font-size="8" font-family="monospace">:5500</text>
  </g>

  <!-- HD Map Generation Server -->
  <g transform="translate(560, 60)">
    <rect width="200" height="140" rx="10" fill="#22c55e" opacity="0.12" stroke="#22c55e" stroke-width="1.5"/>
    <text x="100" y="24" text-anchor="middle" fill="#22c55e" font-size="14" font-family="system-ui" font-weight="700">HD Map Server</text>
    <line x1="20" y1="34" x2="180" y2="34" stroke="#22c55e" opacity="0.3"/>
    <text x="100" y="55" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Data Preprocessing</text>
    <text x="100" y="75" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Map Aggregation (GTSAM)</text>
    <text x="100" y="95" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Nav Map Generation (CUDA)</text>
    <!-- Port -->
    <rect x="140" y="126" width="50" height="14" rx="3" fill="#22c55e" opacity="0.25"/>
    <text x="165" y="136" text-anchor="middle" fill="#22c55e" font-size="8" font-family="monospace">:4000</text>
  </g>

  <!-- Connection arrows -->
  <g stroke-width="2">
    <!-- Site Manager → Bridge Server -->
    <line x1="240" y1="130" x2="300" y2="130" stroke="#6366f1" stroke-dasharray="6,3"/>
    <text x="270" y="122" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui">WebSocket</text>
    <!-- Bridge Server → HD Map Server -->
    <line x1="500" y1="130" x2="560" y2="130" stroke="#22c55e" stroke-dasharray="6,3"/>
    <text x="530" y="122" text-anchor="middle" fill="#4ade80" font-size="8" font-family="system-ui">gRPC</text>
  </g>

  <!-- Bottom row -->
  <!-- PostgreSQL -->
  <g transform="translate(40, 250)">
    <rect width="160" height="80" rx="10" fill="#f97316" opacity="0.12" stroke="#f97316" stroke-width="1.5"/>
    <text x="80" y="24" text-anchor="middle" fill="#f97316" font-size="13" font-family="system-ui" font-weight="700">PostgreSQL</text>
    <line x1="15" y1="34" x2="145" y2="34" stroke="#f97316" opacity="0.3"/>
    <text x="80" y="52" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">PostGIS Extension</text>
    <text x="80" y="68" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Map Metadata / Routes</text>
  </g>

  <!-- Firebase -->
  <g transform="translate(240, 250)">
    <rect width="160" height="80" rx="10" fill="#eab308" opacity="0.12" stroke="#eab308" stroke-width="1.5"/>
    <text x="80" y="24" text-anchor="middle" fill="#eab308" font-size="13" font-family="system-ui" font-weight="700">Firebase Storage</text>
    <line x1="15" y1="34" x2="145" y2="34" stroke="#eab308" opacity="0.3"/>
    <text x="80" y="52" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Map Data Files</text>
    <text x="80" y="68" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">PCD / BMP / GeoTIFF</text>
  </g>

  <!-- Segmentation Server -->
  <g transform="translate(440, 250)">
    <rect width="160" height="80" rx="10" fill="#ec4899" opacity="0.12" stroke="#ec4899" stroke-width="1.5"/>
    <text x="80" y="24" text-anchor="middle" fill="#ec4899" font-size="13" font-family="system-ui" font-weight="700">Segmentation</text>
    <line x1="15" y1="34" x2="145" y2="34" stroke="#ec4899" opacity="0.3"/>
    <text x="80" y="52" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Inference Server</text>
    <text x="80" y="68" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Python · gRPC :9000</text>
  </g>

  <!-- Docker -->
  <g transform="translate(640, 250)">
    <rect width="120" height="80" rx="10" fill="#38bdf8" opacity="0.12" stroke="#38bdf8" stroke-width="1.5"/>
    <text x="60" y="24" text-anchor="middle" fill="#38bdf8" font-size="13" font-family="system-ui" font-weight="700">Docker</text>
    <line x1="15" y1="34" x2="105" y2="34" stroke="#38bdf8" opacity="0.3"/>
    <text x="60" y="52" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Compose</text>
    <text x="60" y="68" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="system-ui">Orchestration</text>
  </g>

  <!-- Vertical connections -->
  <g stroke="#475569" stroke-width="1" stroke-dasharray="4,3" opacity="0.4">
    <line x1="120" y1="200" x2="120" y2="250"/>
    <line x1="320" y1="200" x2="320" y2="250"/>
    <line x1="660" y1="200" x2="520" y2="250"/>
  </g>

  <!-- Legend -->
  <g transform="translate(40, 370)">
    <rect width="720" height="35" rx="6" fill="#1e293b" opacity="0.5"/>
    <circle cx="30" cy="17" r="5" fill="#0ea5e9" opacity="0.6"/>
    <text x="42" y="21" fill="#94a3b8" font-size="9" font-family="system-ui">Frontend/Backend</text>
    <circle cx="160" cy="17" r="5" fill="#8b5cf6" opacity="0.6"/>
    <text x="172" y="21" fill="#94a3b8" font-size="9" font-family="system-ui">Bridge</text>
    <circle cx="240" cy="17" r="5" fill="#22c55e" opacity="0.6"/>
    <text x="252" y="21" fill="#94a3b8" font-size="9" font-family="system-ui">Map Processing</text>
    <circle cx="370" cy="17" r="5" fill="#f97316" opacity="0.6"/>
    <text x="382" y="21" fill="#94a3b8" font-size="9" font-family="system-ui">Database</text>
    <circle cx="460" cy="17" r="5" fill="#eab308" opacity="0.6"/>
    <text x="472" y="21" fill="#94a3b8" font-size="9" font-family="system-ui">Storage</text>
    <circle cx="540" cy="17" r="5" fill="#ec4899" opacity="0.6"/>
    <text x="552" y="21" fill="#94a3b8" font-size="9" font-family="system-ui">AI/ML</text>
  </g>
</svg>
