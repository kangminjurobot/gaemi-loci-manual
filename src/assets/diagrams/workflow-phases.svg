<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <defs>
    <linearGradient id="bg-wf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="800" height="300" rx="12" fill="url(#bg-wf)"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" fill="#e2e8f0" font-size="15" font-family="system-ui" font-weight="700">3-Phase, 25-Step Workflow</text>

  <!-- Phase 1 -->
  <g transform="translate(30, 55)">
    <rect width="230" height="220" rx="10" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="0" y="0" width="230" height="32" rx="10" fill="#0ea5e9" opacity="0.2"/>
    <rect x="0" y="22" width="230" height="10" fill="#0ea5e9" opacity="0.2"/>
    <text x="115" y="22" text-anchor="middle" fill="#0ea5e9" font-size="13" font-family="system-ui" font-weight="700">Phase 1 — 사전 준비</text>

    <text x="20" y="55" fill="#7dd3fc" font-size="10" font-family="system-ui" font-weight="600">Step 0</text>
    <text x="70" y="55" fill="#94a3b8" font-size="10" font-family="system-ui">서비스 구역 등록</text>

    <text x="20" y="75" fill="#7dd3fc" font-size="10" font-family="system-ui" font-weight="600">Step 1</text>
    <text x="70" y="75" fill="#94a3b8" font-size="10" font-family="system-ui">경로 생성</text>

    <text x="20" y="95" fill="#7dd3fc" font-size="10" font-family="system-ui" font-weight="600">Step 2</text>
    <text x="70" y="95" fill="#94a3b8" font-size="10" font-family="system-ui">사전 검수</text>

    <rect x="15" y="115" width="200" height="90" rx="6" fill="#0ea5e9" opacity="0.06"/>
    <text x="115" y="135" text-anchor="middle" fill="#7dd3fc" font-size="9" font-family="system-ui" font-weight="600">사용 도구</text>
    <text x="115" y="152" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">• 서비스 구역 에디터</text>
    <text x="115" y="167" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">• 경로 에디터</text>
    <text x="115" y="182" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">• 대시보드</text>
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(265, 155)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="20,-4 28,0 20,4" fill="#475569"/>
  </g>

  <!-- Phase 2 -->
  <g transform="translate(295, 55)">
    <rect width="230" height="220" rx="10" fill="#8b5cf6" opacity="0.08" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect x="0" y="0" width="230" height="32" rx="10" fill="#8b5cf6" opacity="0.2"/>
    <rect x="0" y="22" width="230" height="10" fill="#8b5cf6" opacity="0.2"/>
    <text x="115" y="22" text-anchor="middle" fill="#a78bfa" font-size="13" font-family="system-ui" font-weight="700">Phase 2 — 맵 생성</text>

    <text x="20" y="55" fill="#c4b5fd" font-size="10" font-family="system-ui" font-weight="600">Step 3-5</text>
    <text x="85" y="55" fill="#94a3b8" font-size="10" font-family="system-ui">매핑 데이터 수집</text>

    <text x="20" y="75" fill="#c4b5fd" font-size="10" font-family="system-ui" font-weight="600">Step 6-8</text>
    <text x="85" y="75" fill="#94a3b8" font-size="10" font-family="system-ui">HD 맵 빌드</text>

    <text x="20" y="95" fill="#c4b5fd" font-size="10" font-family="system-ui" font-weight="600">Step 9-11</text>
    <text x="85" y="95" fill="#94a3b8" font-size="10" font-family="system-ui">맵 보정 · 편집</text>

    <text x="20" y="115" fill="#c4b5fd" font-size="10" font-family="system-ui" font-weight="600">Step 12-14</text>
    <text x="85" y="115" fill="#94a3b8" font-size="10" font-family="system-ui">네비게이션 맵 · 업로드</text>

    <rect x="15" y="135" width="200" height="70" rx="6" fill="#8b5cf6" opacity="0.06"/>
    <text x="115" y="152" text-anchor="middle" fill="#c4b5fd" font-size="9" font-family="system-ui" font-weight="600">사용 도구</text>
    <text x="115" y="167" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">• 베이스 맵 / 2D 맵 에디터</text>
    <text x="115" y="182" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">• 3D 맵 보정 · 파일 관리</text>
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(530, 155)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#475569" stroke-width="2"/>
    <polygon points="20,-4 28,0 20,4" fill="#475569"/>
  </g>

  <!-- Phase 3 -->
  <g transform="translate(560, 55)">
    <rect width="210" height="220" rx="10" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1.5"/>
    <rect x="0" y="0" width="210" height="32" rx="10" fill="#22c55e" opacity="0.2"/>
    <rect x="0" y="22" width="210" height="10" fill="#22c55e" opacity="0.2"/>
    <text x="105" y="22" text-anchor="middle" fill="#4ade80" font-size="13" font-family="system-ui" font-weight="700">Phase 3 — 맵 확장</text>

    <text x="20" y="55" fill="#86efac" font-size="10" font-family="system-ui" font-weight="600">Step 15-19</text>
    <text x="95" y="55" fill="#94a3b8" font-size="10" font-family="system-ui">추가 매핑</text>

    <text x="20" y="75" fill="#86efac" font-size="10" font-family="system-ui" font-weight="600">Step 20-22</text>
    <text x="95" y="75" fill="#94a3b8" font-size="10" font-family="system-ui">맵 머징 · 보정</text>

    <text x="20" y="95" fill="#86efac" font-size="10" font-family="system-ui" font-weight="600">Step 23-24</text>
    <text x="95" y="95" fill="#94a3b8" font-size="10" font-family="system-ui">배포 · 검증</text>

    <rect x="15" y="115" width="180" height="90" rx="6" fill="#22c55e" opacity="0.06"/>
    <text x="105" y="135" text-anchor="middle" fill="#86efac" font-size="9" font-family="system-ui" font-weight="600">멀티 세션</text>
    <text x="105" y="152" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">기존 맵에 새 영역을</text>
    <text x="105" y="167" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">ICP 정렬로 병합하여</text>
    <text x="105" y="182" text-anchor="middle" fill="#94a3b8" font-size="9" font-family="system-ui">서비스 구역을 확장</text>
  </g>
</svg>
